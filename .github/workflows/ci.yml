name: CI

on:
  push:
    branches: [develop, main, master]
  pull_request:
    branches: [develop, main, master]

jobs:
  # 防止直接推送到保护分支
  prevent-direct-push:
    name: Prevent Direct Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Block direct push to protected branch
        run: |
          echo "❌ 直接推送到保护分支被禁止!"
          echo "请使用Pull Request进行代码合并"
          echo "推送的分支: ${{ github.ref }}"
          echo "触发事件: ${{ github.event_name }}"
          exit 1

  swiftlint:
    name: SwiftLint
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: |
          echo "Installing SwiftLint via Homebrew..."
          if ! command -v brew &> /dev/null; then
            echo "Homebrew not found, installing..."
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          brew install swiftlint

      - name: Run SwiftLint
        run: |
          swiftlint --reporter github-actions-logging --strict

  build:
    name: Build
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          xcodebuild -version

      - name: Check iOS Platform
        run: |
          echo "=== 📱 检查 iOS 平台状态 ==="

          # 显示当前已安装的平台
          echo "📋 当前已安装的 SDK:"
          xcodebuild -showsdks | grep simulator

          # 显示可用的运行时
          echo "📋 当前可用的 iOS 运行时:"
          xcrun simctl list runtimes | grep iOS || echo "暂无 iOS 运行时"

          echo "ℹ️  具体的 iOS 18.3.1 检查和下载将在构建步骤中进行"

      - name: Simple Build
        run: |
          echo "=== 🚀 简单直接的 iOS 构建 ==="

          # 显示可用设备（调试用）
          echo "📱 可用的模拟器设备："
          xcrun simctl list devices | grep "iPhone" | head -5

          # 显示可用的 SDK
          echo "📱 可用的 iOS SDK："
          xcodebuild -showsdks | grep simulator

          # 智能选择可用的目标
          echo "🎯 智能选择构建目标..."

          # 首先显示当前可用的 iOS 运行时
          echo "🔍 检查当前可用的 iOS 运行时..."
          AVAILABLE_RUNTIMES=$(xcrun simctl list runtimes | grep "iOS" || echo "")

          if [ -n "$AVAILABLE_RUNTIMES" ]; then
            echo "✅ 当前可用的 iOS 运行时:"
            echo "$AVAILABLE_RUNTIMES"
          else
            echo "❌ 当前没有 iOS 运行时"
          fi

          # 获取最后一个（最新）可用的 iOS 版本
          LATEST_IOS_VERSION=$(xcrun simctl list runtimes | grep "iOS" | tail -1 | awk '{print $2}' | sed 's/[()]//')
          if [ -n "$LATEST_IOS_VERSION" ]; then
            echo "🎯 检测到最新可用的 iOS 版本: $LATEST_IOS_VERSION"
          else
            echo "❌ 无法获取 iOS 版本"
            LATEST_IOS_VERSION="18.3"  # 设置一个默认版本
          fi

          # 检查需要的版本是否存在，如果不存在就下载
          TARGET_VERSION="$LATEST_IOS_VERSION"
          echo "🔍 验证目标版本 iOS $TARGET_VERSION 是否可用..."

          if xcrun simctl list runtimes | grep -q "iOS $TARGET_VERSION"; then
            echo "✅ iOS $TARGET_VERSION 已存在"
          else
            echo "❌ iOS $TARGET_VERSION 不存在，开始下载..."
            echo "📥 下载 iOS $TARGET_VERSION 平台..."
            
            # 尝试多种下载方法
            xcodebuild -downloadPlatform iOS || echo "方法1失败"
            xcrun simctl runtime download "iOS $TARGET_VERSION" 2>/dev/null || echo "方法2失败"
            xcodebuild -downloadAllPlatforms 2>/dev/null || echo "方法3失败"
            
            # 验证下载结果
            echo "📋 下载后的运行时状态:"
            xcrun simctl list runtimes | grep iOS || echo "仍然没有找到 iOS 运行时"
            
            # 重新获取可用版本
            NEW_LATEST=$(xcrun simctl list runtimes | grep "iOS" | tail -1 | awk '{print $2}' | sed 's/[()]//')
            if [ -n "$NEW_LATEST" ]; then
              LATEST_IOS_VERSION="$NEW_LATEST"
              echo "🔄 更新使用版本: $LATEST_IOS_VERSION"
            fi
          fi

          # 尝试多个设备选项（按优先级）
          DEVICES=("iPhone 16" "iPhone 15" "iPhone 14" "iPhone 13")
          SELECTED_DEVICE=""

          for device in "${DEVICES[@]}"; do
            if xcrun simctl list devices | grep -q "$device"; then
              SELECTED_DEVICE="$device"
              echo "✅ 选择设备: $SELECTED_DEVICE"
              break
            fi
          done

          if [ -z "$SELECTED_DEVICE" ]; then
            echo "❌ 未找到合适的设备，使用默认"
            SELECTED_DEVICE="iPhone 15"
          fi

          # 使用选择的设备和最新可用的 iOS 版本进行构建
          echo "🎯 最终构建配置:"
          echo "  设备: $SELECTED_DEVICE"
          echo "  iOS 版本: $LATEST_IOS_VERSION"
          echo "  目标: platform=iOS Simulator,name=$SELECTED_DEVICE,OS=$LATEST_IOS_VERSION"

          # 使用动态选择的设备和最新可用版本进行构建
          xcodebuild \
            -project ZHKLine.xcodeproj \
            -scheme ZHKLine \
            -destination "platform=iOS Simulator,name=$SELECTED_DEVICE,OS=$LATEST_IOS_VERSION" \
            -configuration Debug \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            build

          echo "✅ 构建成功完成！"

