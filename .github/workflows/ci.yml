name: CI

on:
  push:
    branches: [develop, main, master]
  pull_request:
    branches: [develop, main, master]

jobs:
  # 防止直接推送到保护分支
  prevent-direct-push:
    name: Prevent Direct Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Block direct push to protected branch
        run: |
          echo "❌ 直接推送到保护分支被禁止!"
          echo "请使用Pull Request进行代码合并"
          echo "推送的分支: ${{ github.ref }}"
          echo "触发事件: ${{ github.event_name }}"
          exit 1

  swiftlint:
    name: SwiftLint
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: |
          echo "Installing SwiftLint via Homebrew..."
          if ! command -v brew &> /dev/null; then
            echo "Homebrew not found, installing..."
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          brew install swiftlint

      - name: Run SwiftLint
        run: |
          swiftlint --reporter github-actions-logging --strict

  build:
    name: Build
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install Fastlane via Ruby Gem
        run: |
          echo "Installing Fastlane via Ruby gem..."
          sudo gem install fastlane -v 2.228.0
          echo "Installed fastlane version:"
          fastlane --version

      - name: Verify CI simulator availability
        run: |
          echo "=== Checking available iOS simulators ==="
          xcrun simctl list devices | grep "iPhone 16" | head -3
          echo "Local uses: iPhone 16, iOS 18.3.1"
          echo "CI will use: iPhone 16, iOS 18.6 (or latest available)"

      - name: Build with Fastlane
        run: |
          echo "Building with iOS 18.6 + iPhone 16..."
          export IOS_VERSION="18.6"
          fastlane build

