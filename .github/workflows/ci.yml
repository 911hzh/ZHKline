name: CI

on:
  push:
    branches: [develop, main, master]
  pull_request:
    branches: [develop, main, master]

env:
  XCODE_VERSION: "16.4"
  IOS_DEPLOYMENT_TARGET: "15.6"

jobs:
  # 防止直接推送到保护分支
  prevent-direct-push:
    name: Prevent Direct Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Block direct push to protected branch
        run: |
          echo "❌ 直接推送到保护分支被禁止!"
          echo "请使用Pull Request进行代码合并"
          echo "推送的分支: ${{ github.ref }}"
          echo "触发事件: ${{ github.event_name }}"
          exit 1

  swiftlint:
    name: SwiftLint
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --reporter github-actions-logging --strict

  build:
    name: Build
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer
          xcodebuild -version

      - name: Install iOS Platform
        run: |
          echo "=== 📱 检查和安装 iOS 平台 ==="

          # 显示当前已安装的平台
          echo "📋 当前已安装的平台:"
          xcodebuild -showsdks

          # 显示可用的运行时
          echo "📋 当前可用的运行时:"
          xcrun simctl list runtimes

          # 尝试安装最新的 iOS 模拟器运行时
          echo "📥 检查是否需要安装 iOS 模拟器运行时..."

          # 使用 Xcode 16.4 自带的最新模拟器
          echo "✅ 使用 Xcode ${{ env.XCODE_VERSION }} 自带的最新模拟器平台"

      - name: Build
        run: |
          echo "🚀 开始构建..."

          # 显示可用设备（调试用）
          echo "📱 可用的模拟器设备："
          xcrun simctl list devices | grep "iPhone" | head -5

          # 显示可用的 SDK
          echo "📱 可用的 iOS SDK："
          xcodebuild -showsdks | grep simulator

          # 智能选择可用的目标
          echo "🎯 智能选择构建目标..."

          # 尝试多个设备选项（按优先级）
          DEVICES=("iPhone 16" "iPhone 15" "iPhone 14" "iPhone 13")
          SELECTED_DEVICE=""

          for device in "${DEVICES[@]}"; do
            if xcrun simctl list devices | grep -q "$device"; then
              SELECTED_DEVICE="$device"
              echo "✅ 选择设备: $SELECTED_DEVICE"
              break
            fi
          done

          if [ -z "$SELECTED_DEVICE" ]; then
            echo "❌ 未找到合适的设备，使用默认"
            SELECTED_DEVICE="iPhone 15"
          fi

          # 使用最新可用的模拟器系统版本
          xcodebuild \
            -project ZHKLine.xcodeproj \
            -scheme ZHKLine \
            -destination "platform=iOS Simulator,name=$SELECTED_DEVICE,OS=latest" \
            -configuration Debug \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET=${{ env.IOS_DEPLOYMENT_TARGET }} \
            build

          echo "✅ 构建成功完成！"

