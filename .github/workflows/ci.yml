name: CI

on:
  push:
    branches: [develop, main, master]
  pull_request:
    branches: [develop, main, master]

env:
  XCODE_VERSION: "16.4"
  IOS_DEPLOYMENT_TARGET: "15.6"

jobs:
  # 防止直接推送到保护分支
  prevent-direct-push:
    name: Prevent Direct Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Block direct push to protected branch
        run: |
          echo "❌ 直接推送到保护分支被禁止!"
          echo "请使用Pull Request进行代码合并"
          echo "推送的分支: ${{ github.ref }}"
          echo "触发事件: ${{ github.event_name }}"
          exit 1

  swiftlint:
    name: SwiftLint
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --reporter github-actions-logging --strict

  build:
    name: Build
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer
          xcodebuild -version

      - name: Build
        run: |
          xcodebuild \
            -project ZHKLine.xcodeproj \
            -scheme ZHKLine \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            -configuration Debug \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET=${{ env.IOS_DEPLOYMENT_TARGET }} \
            build

